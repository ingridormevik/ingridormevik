<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>vision entity</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Barlow Condensed',sans-serif}
body{position:fixed;inset:0}
#wrap{position:absolute;inset:0}

/* media */
#cam,#still{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#cam{display:none}
#still{display:none}

/* overlays */
#grain{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:.3;mix-blend-mode:overlay}
.vig{position:absolute;inset:0;z-index:3;pointer-events:none;
background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.2) 65%,rgba(0,0,0,.7) 100%),
linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 20%,transparent 78%,rgba(0,0,0,.75) 100%)}
.scan{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:.07;
background:repeating-linear-gradient(180deg,rgba(255,255,255,.08) 0 1px,transparent 1px 3px)}
#beam{position:absolute;left:0;right:0;height:2px;z-index:5;pointer-events:none;
background:linear-gradient(90deg,transparent,#ff2d7a,transparent);
box-shadow:0 0 20px #ff2d7a;opacity:0;top:0}
#beam.on{opacity:1;animation:beam 1.6s ease-in-out infinite}
@keyframes beam{0%{top:5%}50%{top:90%}100%{top:5%}}

/* entities */
#ents{position:absolute;inset:0;z-index:10;pointer-events:none}
.ent{position:absolute;animation:entIn .3s ease forwards}
@keyframes entIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.ebox{position:absolute;inset:0;border:1.5px solid currentColor;border-radius:4px}
.ebox::before{content:’’;position:absolute;top:-1.5px;left:-1.5px;width:12px;height:12px;
border-top:2.5px solid currentColor;border-left:2.5px solid currentColor;border-radius:2px 0 0 0}
.ebox::after{content:’’;position:absolute;bottom:-1.5px;right:-1.5px;width:12px;height:12px;
border-bottom:2.5px solid currentColor;border-right:2.5px solid currentColor;border-radius:0 0 2px 0}
.eglow{position:absolute;inset:-8px;border-radius:10px;background:currentColor;opacity:.1;filter:blur(12px)}
.elabel{position:absolute;top:-26px;left:0;font-size:10px;font-weight:700;letter-spacing:.18em;
text-transform:uppercase;padding:3px 8px;background:rgba(0,0,0,.65);
border:1px solid currentColor;border-radius:3px;color:currentColor;white-space:nowrap}
.epoem{position:absolute;left:0;font-weight:900;line-height:.9;letter-spacing:-.04em;
text-transform:lowercase;color:currentColor;
text-shadow:0 2px 20px rgba(0,0,0,1),0 0 40px rgba(0,0,0,.9);
animation:pfloat 3s ease-in-out infinite}
@keyframes pfloat{0%,100%{transform:translate(0,0)}50%{transform:translate(1px,-2px)}}
.epoem .l1{display:block;font-size:clamp(16px,5vw,44px)}
.epoem .l2{display:block;font-size:clamp(20px,6.5vw,56px);padding-left:.15em}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;z-index:20;pointer-events:none;
padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px;
display:flex;justify-content:space-between;align-items:flex-start;
background:linear-gradient(180deg,rgba(0,0,0,.72) 0%,transparent 100%)}
.tag{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
display:flex;align-items:center;gap:7px}
.dot{width:6px;height:6px;border-radius:50%;background:#ff2d7a;box-shadow:0 0 10px #ff2d7a;
animation:dp 1.4s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.65)}}
#status{font-size:10px;font-weight:400;letter-spacing:.12em;
padding:5px 12px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.14);
border-radius:999px;max-width:55vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
transition:border-color .3s}
#status.hot{border-color:#ff2d7a}
#status.ok{border-color:#d6ff6b}

/* controls */
#ctrl{position:absolute;bottom:0;left:0;right:0;z-index:20;
padding:12px 14px calc(16px + env(safe-area-inset-bottom,0px));
background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,transparent 100%);
display:flex;justify-content:center;gap:10px;flex-wrap:wrap;align-items:center}
.btn{appearance:none;border:1px solid rgba(255,255,255,.18);color:#fff;cursor:pointer;
padding:11px 18px;border-radius:999px;background:rgba(8,10,14,.6);
backdrop-filter:blur(14px);font-family:‘Barlow Condensed’,sans-serif;
font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
.btn.primary{background:linear-gradient(135deg,rgba(255,45,122,.8),rgba(126,247,255,.25));
border-color:rgba(255,45,122,.5)}
.btn.lit{border-color:#d6ff6b;color:#d6ff6b}
input[type=file]{display:none}

/* intro */
#intro{position:absolute;inset:0;z-index:30;display:grid;place-items:center;padding:24px;
background:rgba(0,0,0,.92);backdrop-filter:blur(20px)}
.card{width:min(94vw,480px);padding:28px;border-radius:20px;
border:1px solid rgba(255,255,255,.13);background:rgba(8,10,14,.8);
box-shadow:0 40px 80px rgba(0,0,0,.6)}
.card h1{font-size:clamp(42px,12vw,72px);font-weight:900;line-height:.88;
letter-spacing:-.05em;margin-bottom:16px}
.card h1 em{color:#ff2d7a;font-style:normal}
.card p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.55;margin-bottom:14px}
.card-btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.tiny{font-size:11px;color:rgba(255,255,255,.35);margin-top:14px}
.hidden{display:none!important}
</style>

</head>
<body>
<div id="wrap">
  <video id="cam" autoplay playsinline muted></video>
  <img id="still" alt="">
  <canvas id="grain"></canvas>
  <div class="vig"></div>
  <div class="scan"></div>
  <div id="beam"></div>
  <div id="ents"></div>

  <div id="hud">
    <div class="tag"><span class="dot"></span>vision entity</div>
    <div id="status">ready</div>
  </div>

  <div id="ctrl">
    <button class="btn lit" id="btn-cinema">cinema</button>
    <button class="btn primary" id="btn-scan">scan now</button>
    <button class="btn" id="btn-clear">clear</button>
    <label class="btn">upload photo<input type="file" id="file-pick" accept="image/*"></label>
  </div>

  <div id="intro">
    <div class="card">
      <h1>live<br><em>vision</em><br>entity</h1>
      <p>Real AI detects objects, draws boxes, writes poetry for each one. Text follows what Claude actually sees.</p>
      <div class="card-btns">
        <button class="btn primary" id="btn-cam">start camera</button>
        <label class="btn">upload photo<input type="file" id="file-intro" accept="image/*"></label>
      </div>
      <p class="tiny">Open at ingridormevik.github.io in Safari for camera access.</p>
    </div>
  </div>
</div>

<script>
const MODEL   = 'claude-sonnet-4-6';
const COLORS  = ['#ff2d7a','#7ef7ff','#d6ff6b','#ffb347','#c4b5fd'];
const CAP_W   = 640;
const CAP_Q   = 0.75;

let camStream = null;
let entities  = [];
let scanning  = false;
let lastScan  = 0;
let cinemaOn  = true;
let t0        = Date.now();

const cam     = document.getElementById('cam');
const still   = document.getElementById('still');
const grain   = document.getElementById('grain');
const gctx    = grain.getContext('2d');
const ents    = document.getElementById('ents');
const statusEl= document.getElementById('status');
const beam    = document.getElementById('beam');
const intro   = document.getElementById('intro');
const wrap    = document.getElementById('wrap');

// letterbox
const lbTop = document.createElement('div');
const lbBot = document.createElement('div');
[lbTop,lbBot].forEach(el=>{
  el.style.cssText='position:absolute;left:0;right:0;background:#000;z-index:6;pointer-events:none;height:0;transition:height .7s ease';
  wrap.appendChild(el);
});
lbTop.style.top='0';
lbBot.style.bottom='0';
function setCinema(on){
  cinemaOn=on;
  lbTop.style.height=on?'9vh':'0';
  lbBot.style.height=on?'9vh':'0';
  document.getElementById('btn-cinema').classList.toggle('lit',on);
}
setCinema(true);

function setStatus(txt,cls){
  statusEl.textContent=txt;
  statusEl.className=cls||'';
}

// ── CAMERA ───────────────────────────────────────────────
async function startCam(){
  try{
    if(camStream) camStream.getTracks().forEach(t=>t.stop());
    camStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false
    });
    cam.srcObject=camStream;
    cam.style.display='block';
    still.style.display='none';
    intro.classList.add('hidden');
    setStatus('camera live');
    lastScan=0;
  }catch(e){
    setStatus('camera denied');
    intro.classList.add('hidden');
  }
}

// ── UPLOAD ───────────────────────────────────────────────
function loadImage(file){
  if(!file||!file.type.startsWith('image/'))return;
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  cam.style.display='none';
  setStatus('loading…');
  const reader=new FileReader();
  reader.onload=function(ev){
    still.onload=function(){
      still.style.display='block';
      intro.classList.add('hidden');
      setStatus('image ready');
      setTimeout(doScan,300);
    };
    still.onerror=function(){setStatus('image failed');};
    still.src=ev.target.result;
  };
  reader.onerror=()=>setStatus('read failed');
  reader.readAsDataURL(file);
}

// ── CAPTURE FRAME ────────────────────────────────────────
function capture(){
  let src=null, sw=0, sh=0;
  if(cam.style.display!=='none' && cam.readyState>=2){
    src=cam; sw=cam.videoWidth; sh=cam.videoHeight;
  } else if(still.style.display!=='none' && still.naturalWidth){
    src=still; sw=still.naturalWidth; sh=still.naturalHeight;
  }
  if(!src||!sw||!sh){
    // fallback: use rendered size
    if(src){sw=src.offsetWidth||innerWidth;sh=src.offsetHeight||innerHeight;}
    else return null;
  }
  const c=document.createElement('canvas');
  c.width=CAP_W; c.height=Math.round(CAP_W*sh/sw);
  try{c.getContext('2d').drawImage(src,0,0,c.width,c.height);}
  catch(e){console.log('capture err',e.message);return null;}
  const url=c.toDataURL('image/jpeg',CAP_Q);
  console.log('captured',c.width+'x'+c.height,'len',url.length);
  return url;
}

// ── SCAN ─────────────────────────────────────────────────
async function doScan(){
  if(scanning)return;
  const frame=capture();
  if(!frame){setStatus('no frame');return;}

  scanning=true;
  beam.classList.add('on');
  setStatus('scanning…','hot');

  try{
    const b64=frame.split(',')[1];
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:MODEL,
        max_tokens:1024,
        system:'You are a JSON API. Respond ONLY with a valid JSON object. No markdown, no explanation.',
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
            {type:'text',text:'Detect 3-5 objects in this image. Return ONLY this JSON:\n{"scene":"3 words","objects":[{"label":"name","x":0.1,"y":0.1,"w":0.2,"h":0.2,"confidence":0.9,"poem":["line one","line two"]}]}\nx,y=top-left corner fraction. w,h=size fraction. poem=2 short lowercase lines.'}
          ]
        }]
      })
    });

    const txt=await resp.text();
    console.log('API',resp.status,txt.slice(0,300));

    if(!resp.ok) throw new Error('API '+resp.status+': '+txt.slice(0,100));

    const data=JSON.parse(txt);
    if(data.error) throw new Error(data.error.message);

    const raw=data.content?.find(b=>b.type==='text')?.text||'';
    const s=raw.indexOf('{'), e=raw.lastIndexOf('}');
    if(s<0||e<0) throw new Error('no JSON in: '+raw.slice(0,80));
    const parsed=JSON.parse(raw.slice(s,e+1));

    if(parsed.objects?.length){
      entities=parsed.objects.slice(0,5).map((o,i)=>({...o,color:COLORS[i%COLORS.length]}));
      setStatus(parsed.scene||entities.length+' found','ok');
    } else {
      setStatus('nothing detected');
    }
  }catch(err){
    console.error('scan error:',err);
    setStatus(err.message.slice(0,60));
  }

  scanning=false;
  beam.classList.remove('on');
  lastScan=performance.now();
}

// ── RENDER ───────────────────────────────────────────────
function render(){
  ents.innerHTML='';
  const vw=innerWidth,vh=innerHeight;
  entities.forEach(e=>{
    const l=e.x*vw, t=e.y*vh, w=e.w*vw, h=e.h*vh;
    const el=document.createElement('div');
    el.className='ent';
    el.style.cssText=`left:${l}px;top:${t}px;width:${w}px;height:${h}px;color:${e.color}`;
    el.innerHTML=`<div class="eglow"></div><div class="ebox"></div><div class="elabel">${e.label}</div>`;
    if(e.poem?.length){
      const p=document.createElement('div');
      p.className='epoem';
      const below=vh-(t+h);
      if(below>90){p.style.top=(h+12)+'px';}
      else{p.style.bottom=(h+12)+'px';}
      p.style.left=(w*0.05)+'px';
      e.poem.forEach((line,i)=>{
        const s=document.createElement('span');
        s.className=i===0?'l1':'l2';
        s.textContent=line;
        p.appendChild(s);
      });
      el.appendChild(p);
    }
    ents.appendChild(el);
  });
}

// ── GRAIN ────────────────────────────────────────────────
let lastG=0;
function drawGrain(now){
  if(now-lastG<90)return; lastG=now;
  const w=grain.width=innerWidth, h=grain.height=innerHeight;
  const id=gctx.createImageData(w,h);
  for(let i=0;i<id.data.length;i+=4){
    const v=(Math.random()*255)|0;
    id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=22;
  }
  gctx.putImageData(id,0,0);
}

// ── LOOP ─────────────────────────────────────────────────
function loop(now){
  requestAnimationFrame(loop);
  drawGrain(now);
  if(entities.length) render();
  if(!scanning && lastScan>0 && now-lastScan>4500) doScan();
}

// ── EVENTS ───────────────────────────────────────────────
document.getElementById('btn-cam').onclick=startCam;
document.getElementById('btn-scan').onclick=()=>{lastScan=1;doScan();};
document.getElementById('btn-clear').onclick=()=>{entities=[];ents.innerHTML='';setStatus('cleared');};
document.getElementById('btn-cinema').onclick=()=>setCinema(!cinemaOn);
document.getElementById('file-pick').onchange=e=>{loadImage(e.target.files[0]);e.target.value='';};
document.getElementById('file-intro').onchange=e=>{loadImage(e.target.files[0]);e.target.value='';};

requestAnimationFrame(loop);
</script>

</body>
</html>
