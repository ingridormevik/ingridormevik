<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>vision entity</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --accent: #ff2d7a;
  --cyan: #7ef7ff;
  --lime: #d6ff6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Barlow Condensed', sans-serif; }
body { position: fixed; inset: 0; }

#app { position: absolute; inset: 0; overflow: hidden; }

/* media layers */
#bg-video, #bg-img {
position: absolute; inset: 0; width: 100%; height: 100%;
object-fit: cover; z-index: 1; display: none;
}

/* overlays */
#grain { position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: .35; mix-blend-mode: overlay; }
.vignette {
position: absolute; inset: 0; z-index: 4; pointer-events: none;
background:
radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,.2) 65%, rgba(0,0,0,.7) 100%),
linear-gradient(180deg, rgba(0,0,0,.55) 0%, transparent 20%, transparent 78%, rgba(0,0,0,.75) 100%);
}
.scanlines {
position: absolute; inset: 0; z-index: 5; pointer-events: none; opacity: .08;
background: repeating-linear-gradient(180deg, rgba(255,255,255,.07) 0 1px, transparent 1px 3px);
}
.lb { position: absolute; left: 0; right: 0; z-index: 6; pointer-events: none; background: #000; height: 0; transition: height .7s ease; }
#lb-top { top: 0; }
#lb-bot { bottom: 0; }
.cinema #lb-top, .cinema #lb-bot { height: 9vh; }

/* scan beam */
#beam {
position: absolute; left: 0; right: 0; height: 2px; z-index: 7; pointer-events: none;
background: linear-gradient(90deg, transparent, var(–accent), transparent);
box-shadow: 0 0 20px var(–accent);
opacity: 0; top: 0;
}
#beam.on { opacity: 1; animation: beamMove 1.6s ease-in-out infinite; }
@keyframes beamMove { 0%{top:5%} 50%{top:90%} 100%{top:5%} }

/* entities */
#entities { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
.ent {
position: absolute;
animation: entIn .35s ease forwards;
}
@keyframes entIn { from { opacity:0; transform:scale(.9); } to { opacity:1; transform:scale(1); } }
.ent-box {
position: absolute; inset: 0;
border: 1.5px solid currentColor;
border-radius: 4px;
}
.ent-box::before { content:’’; position:absolute; top:-1.5px; left:-1.5px; width:12px; height:12px; border-top: 2px solid currentColor; border-left: 2px solid currentColor; border-radius: 2px 0 0 0; }
.ent-box::after  { content:’’; position:absolute; bottom:-1.5px; right:-1.5px; width:12px; height:12px; border-bottom: 2px solid currentColor; border-right: 2px solid currentColor; border-radius: 0 0 2px 0; }
.ent-glow { position:absolute; inset:-8px; border-radius:10px; background:currentColor; opacity:.12; filter:blur(12px); }
.ent-label {
position: absolute; top: -24px; left: 0;
font-size: 10px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
padding: 3px 8px; background: rgba(0,0,0,.6); border: 1px solid currentColor;
border-radius: 3px; color: currentColor; white-space: nowrap;
}
.ent-conf { position: absolute; bottom: -6px; left: 0; height: 2px; background: currentColor; opacity: .55; }
.ent-poem {
position: absolute; left: 0;
font-weight: 900; line-height: .9; letter-spacing: -.04em; text-transform: lowercase;
color: currentColor;
text-shadow: 0 2px 20px rgba(0,0,0,1), 0 0 40px rgba(0,0,0,.9);
animation: poemFloat 3s ease-in-out infinite;
}
@keyframes poemFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(1px,-2px)} }
.ent-poem .l1 { display:block; font-size: clamp(16px,5vw,44px); }
.ent-poem .l2 { display:block; font-size: clamp(20px,6.5vw,56px); padding-left:.15em; }

/* HUD */
#hud {
position: absolute; top: 0; left: 0; right: 0; z-index: 20; pointer-events: none;
padding: calc(14px + var(–safe-top)) 16px 16px;
display: flex; justify-content: space-between; align-items: flex-start;
background: linear-gradient(180deg, rgba(0,0,0,.7) 0%, transparent 100%);
}
.hud-l { display:flex; flex-direction:column; gap:5px; }
.tag { font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; display:flex; align-items:center; gap:7px; }
.recdot { width:6px; height:6px; border-radius:50%; background:var(–accent); box-shadow:0 0 10px var(–accent); animation:recPulse 1.4s ease-in-out infinite; }
@keyframes recPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.65)} }
.tc { font-size:10px; font-weight:300; letter-spacing:.16em; opacity:.35; }
.hud-r { display:flex; flex-direction:column; align-items:flex-end; gap:5px; }
#status {
font-size:10px; font-weight:400; letter-spacing:.12em;
padding:5px 12px; background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.12);
border-radius:999px; max-width:55vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
transition: border-color .3s;
}
#status.scanning { border-color: var(–accent); }
#status.done { border-color: var(–lime); }
#ecount { font-size:9px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; opacity:.32; }

/* controls */
#controls {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
padding: 12px 14px calc(16px + var(–safe-bottom));
background: linear-gradient(0deg, rgba(0,0,0,.82) 0%, transparent 100%);
display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center;
}
.btn {
appearance: none; border: 1px solid rgba(255,255,255,.18); color: #fff; cursor: pointer;
padding: 11px 16px; border-radius: 999px;
background: rgba(8,10,14,.58); backdrop-filter: blur(14px);
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 700; font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
transition: border-color .2s, background .2s;
display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { background: rgba(255,255,255,.12); }
.btn.primary { background: linear-gradient(135deg, rgba(255,45,122,.78), rgba(126,247,255,.25)); border-color: rgba(255,45,122,.5); }
.btn.active { border-color: var(–lime); color: var(–lime); }
input[type=file] { display: none; }

/* intro */
#intro {
position: absolute; inset: 0; z-index: 30;
display: grid; place-items: center; padding: 24px;
background: radial-gradient(ellipse at 30% 20%, rgba(255,45,122,.13), transparent 40%),
radial-gradient(ellipse at 70% 80%, rgba(126,247,255,.10), transparent 40%),
rgba(0,0,0,.9);
}
.card {
width: min(94vw, 500px); padding: 28px;
border-radius: 20px; border: 1px solid rgba(255,255,255,.13);
background: rgba(8,10,14,.75); backdrop-filter: blur(24px);
box-shadow: 0 40px 80px rgba(0,0,0,.6);
}
.card h1 { font-size: clamp(40px,11vw,68px); font-weight:900; line-height:.88; letter-spacing:-.05em; margin-bottom:14px; }
.card h1 em { color: var(–accent); font-style: normal; }
.card p { font-size:14px; color:rgba(255,255,255,.7); line-height:1.55; margin-bottom:10px; }
.card-btns { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
.tiny { font-size:11px; color:rgba(255,255,255,.35); margin-top:14px; }
.hidden { display: none !important; }
</style>

</head>

<script>
// ── CONFIG ───────────────────────────────────────────────
const MODEL         = 'claude-sonnet-4-6';
const SCAN_INTERVAL = 4500;
const CAP_W         = 640;
const CAP_Q         = 0.72;
const COLORS        = ['#ff2d7a','#7ef7ff','#d6ff6b','#ffb347','#c4b5fd'];

// ── STATE ────────────────────────────────────────────────
let camStream  = null;
let mediaEl    = null;   // active img or video element being displayed
let appReady   = false;
let scanning   = false;
let lastScan   = 0;
let voiceOn    = false;
let cinemaOn   = true;
let entities   = [];
let t0         = Date.now();

// ── ELEMENTS ─────────────────────────────────────────────
const appEl      = document.getElementById(‘app’);
const bgVideo    = document.getElementById(‘bg-video’);
const bgImg      = document.getElementById(‘bg-img’);
const grainEl    = document.getElementById(‘grain’);
const grainCtx   = grainEl.getContext(‘2d’);
const entLayer   = document.getElementById(‘entities’);
const statusEl   = document.getElementById(‘status’);
const ecountEl   = document.getElementById(‘ecount’);
const tcEl       = document.getElementById(‘tc’);
const beamEl     = document.getElementById(‘beam’);
const introEl    = document.getElementById(‘intro’);

// ── HELPERS ──────────────────────────────────────────────
function setStatus(txt, cls) {
statusEl.textContent = txt;
statusEl.className = cls || ‘’;
}

function speak(txt) {
if (!voiceOn || !window.speechSynthesis) return;
window.speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(txt);
u.rate = 0.88; u.pitch = 0.9;
window.speechSynthesis.speak(u);
}

function formatTC() {
const d = Date.now() - t0;
const pad = (n, z=2) => String(n).padStart(z,‘0’);
return `${pad(Math.floor(d/3600000))}:${pad(Math.floor(d/60000)%60)}:${pad(Math.floor(d/1000)%60)}:${pad(Math.floor((d%1000)/33))}`;
}

// ── CAMERA ───────────────────────────────────────────────
async function startCamera() {
try {
if (camStream) camStream.getTracks().forEach(t => t.stop());
camStream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: ‘environment’, width: { ideal: 1280 }, height: { ideal: 720 } },
audio: false
});
bgVideo.srcObject = camStream;
bgVideo.style.display = ‘block’;
bgImg.style.display = ‘none’;
mediaEl = bgVideo;
introEl.classList.add(‘hidden’);
appReady = true;
lastScan = 0;
setStatus(‘camera live’);
} catch(err) {
setStatus(‘camera denied — try upload’);
}
}

// ── FILE UPLOAD ──────────────────────────────────────────
function loadFile(file) {
if (!file) return;
if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
setStatus(‘loading…’);
introEl.classList.add(‘hidden’);

const reader = new FileReader();
reader.onerror = () => setStatus(‘file read failed’);

reader.onload = function(ev) {
const dataURL = ev.target.result;

```
if (file.type.startsWith('video/')) {
  // Extract a single frame via canvas — avoids ALL format/codec issues
  // Works for any video the OS can decode even if the browser element struggles
  const vid = document.createElement('video');
  vid.muted     = true;
  vid.playsInline = true;
  vid.preload   = 'auto';

  vid.addEventListener('error', function() {
    // Fallback: try showing the video directly anyway
    bgImg.style.display   = 'none';
    bgVideo.style.display = 'block';
    bgVideo.src = dataURL;
    bgVideo.load();
    bgVideo.oncanplay = function() {
      bgVideo.oncanplay = null;
      mediaEl = bgVideo;
      appReady = true; lastScan = 0;
      setStatus('video ready');
      bgVideo.play().catch(()=>{});
      setTimeout(doScan, 800);
    };
    bgVideo.onerror = () => setStatus('unsupported format — try MP4 or MOV');
  }, { once: true });

  vid.addEventListener('loadeddata', function() {
    // Seek to 0.5s (or start) to get a representative frame
    vid.currentTime = Math.min(0.5, vid.duration || 0);
  }, { once: true });

  vid.addEventListener('seeked', function() {
    // Draw frame to canvas, then use as static image
    const c = document.createElement('canvas');
    c.width  = vid.videoWidth  || 640;
    c.height = vid.videoHeight || 360;
    try {
      c.getContext('2d').drawImage(vid, 0, 0, c.width, c.height);
      const frameURL = c.toDataURL('image/jpeg', 0.92);

      // Show the frame as background image
      bgVideo.style.display = 'none';
      bgImg.style.display   = 'block';
      bgImg.src = frameURL;
      mediaEl   = bgImg;

      // Also show video playing behind (best effort)
      bgVideo.src  = dataURL;
      bgVideo.style.display = 'block';
      bgVideo.play().catch(()=>{});

      appReady = true; lastScan = 0;
      setStatus('video frame captured');
      setTimeout(doScan, 400);
    } catch(e) {
      setStatus('frame capture failed');
    }
    vid.src = ''; // free memory
  }, { once: true });

  vid.src = dataURL;
  vid.load();

} else {
  // Image
  bgVideo.style.display = 'none';
  bgImg.onload  = null;
  bgImg.onerror = null;
  bgImg.onload = function() {
    bgImg.onload        = null;
    bgImg.style.display = 'block';
    mediaEl  = bgImg;
    appReady = true; lastScan = 0;
    setStatus('image ready');
    setTimeout(doScan, 400);
  };
  bgImg.onerror = () => setStatus('image failed to load');
  bgImg.src = dataURL;
}

};

reader.readAsDataURL(file);
}

// ── FRAME CAPTURE ────────────────────────────────────────
function captureFrame() {
if (!mediaEl) { console.log(‘captureFrame: no mediaEl’); return null; }

const isVideo = mediaEl.tagName === ‘VIDEO’;
const isImg   = mediaEl.tagName === ‘IMG’;

// Get dimensions — fall back to viewport if needed
let sw = isVideo ? mediaEl.videoWidth  : mediaEl.naturalWidth;
let sh = isVideo ? mediaEl.videoHeight : mediaEl.naturalHeight;

// If still 0, use the rendered size
if (!sw || !sh) {
sw = mediaEl.offsetWidth  || mediaEl.clientWidth  || innerWidth;
sh = mediaEl.offsetHeight || mediaEl.clientHeight || innerHeight;
}

if (!sw || !sh) { console.log(‘captureFrame: zero dimensions’); return null; }

const c = document.createElement(‘canvas’);
c.width  = CAP_W;
c.height = Math.max(1, Math.round(CAP_W * sh / sw));

try {
c.getContext(‘2d’).drawImage(mediaEl, 0, 0, c.width, c.height);
} catch(e) {
console.log(‘captureFrame drawImage error:’, e.message);
return null;
}

const result = c.toDataURL(‘image/jpeg’, CAP_Q);
console.log(‘captureFrame OK:’, c.width, ‘x’, c.height, ‘dataURL length:’, result.length);
return result;
}

// ── AI SCAN ──────────────────────────────────────────────
async function doScan() {
if (scanning) return;
const frame = captureFrame();
if (!frame) {
const el = mediaEl;
const info = el ? (el.tagName + ’ rs=’ + (el.readyState||‘n/a’) + ’ w=’ + (el.videoWidth||el.naturalWidth||el.offsetWidth) + ’ h=’ + (el.videoHeight||el.naturalHeight||el.offsetHeight)) : ‘no mediaEl’;
setStatus(’no frame: ’ + info);
return;
}

scanning = true;
beamEl.classList.add(‘on’);
setStatus(‘scanning…’, ‘scanning’);

try {
// Extract base64 — handle both data:image/jpeg;base64,XXX and raw base64
const commaIdx = frame.indexOf(’,’);
const b64 = commaIdx >= 0 ? frame.slice(commaIdx + 1) : frame;
if (!b64 || b64.length < 100) throw new Error(‘frame too small to scan’);

```
const body = {
  model: MODEL,
  max_tokens: 1200,
  system: 'You are a JSON API. Always respond with ONLY a valid JSON object. Never use markdown code fences. Never add explanations.',
  messages: [{
    role: 'user',
    content: [
      {
        type: 'image',
        source: { type: 'base64', media_type: 'image/jpeg', data: b64 }
      },
      {
        type: 'text',
        text: 'Detect objects in this image. Return a JSON object with keys "scene" (3-word string) and "objects" (array). Each object has: label (string), x (number 0-1), y (number 0-1), w (number 0-1), h (number 0-1), confidence (number 0-1), poem (array of 2 strings). x/y are top-left corner fractions, w/h are size fractions. Detect 3-5 subjects. Poem lines are short lowercase fragments. Return ONLY the JSON object, nothing else.'
      }
    ]
  }]
};

const bodyStr = JSON.stringify(body);
console.log('Sending to API, model:', body.model, 'b64 length:', b64.length, 'body size:', bodyStr.length);

const resp = await fetch('https://api.anthropic.com/v1/messages', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json',
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true'
  },
  body: bodyStr
});

let data;
try { data = await resp.json(); } catch(e) { throw new Error('response not JSON: ' + resp.status); }
console.log('API status:', resp.status);
console.log('API body:', JSON.stringify(data).slice(0, 500));

if (data.error) throw new Error(resp.status + ' ' + JSON.stringify(data.error));
if (!resp.ok)   throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);

const raw = data.content?.find(b => b.type === 'text')?.text;
if (!raw) throw new Error('no text block. content=' + JSON.stringify(data.content).slice(0,200));

// Extract JSON — find first { ... }
let jsonStr = raw.trim().replace(/^```[a-zA-Z]*/, '').replace(/```$/, '').trim();
const braceStart = jsonStr.indexOf('{');
const braceEnd   = jsonStr.lastIndexOf('}');
if (braceStart < 0 || braceEnd < 0) throw new Error('no JSON in: ' + raw.slice(0,100));
jsonStr = jsonStr.slice(braceStart, braceEnd + 1);

const parsed = JSON.parse(jsonStr);

if (parsed.objects?.length) {
  entities = parsed.objects.slice(0, 5).map((o, i) => ({ ...o, color: COLORS[i % COLORS.length] }));
  setStatus(parsed.scene || entities.length + ' found', 'done');
  ecountEl.textContent = entities.length + ' entit' + (entities.length === 1 ? 'y' : 'ies');
  if (voiceOn && entities[0]) speak(entities[0].poem.join(' '));
} else {
  setStatus('nothing detected');
}

} catch(err) {
console.error(‘doScan error:’, err);
setStatus(’error: ’ + String(err.message).slice(0, 50));
}

scanning = false;
beamEl.classList.remove(‘on’);
lastScan = performance.now();
}

entLayer.innerHTML = ‘’;
const vw = innerWidth, vh = innerHeight;

entities.forEach(e => {
const left   = e.x * vw;
const top    = e.y * vh;
const width  = e.w * vw;
const height = e.h * vh;

});
}

// ── GRAIN ────────────────────────────────────────────────
let lastGrain = 0;
function drawGrain(now) {
if (now - lastGrain < 80) return;
lastGrain = now;
const w = grainEl.width  = innerWidth;
const h = grainEl.height = innerHeight;
const id = grainCtx.createImageData(w, h);
for (let i = 0; i < id.data.length; i += 4) {
const v = (Math.random() * 255) | 0;
id.data[i] = id.data[i+1] = id.data[i+2] = v;
id.data[i+3] = 25;
}
grainCtx.putImageData(id, 0, 0);
}

// ── MAIN LOOP ────────────────────────────────────────────
function loop(now) {
requestAnimationFrame(loop);
tcEl.textContent = formatTC();
drawGrain(now);
if (entities.length) renderEntities();
if (appReady && !scanning && now - lastScan > SCAN_INTERVAL) doScan();
}

// ── EVENTS ───────────────────────────────────────────────
document.getElementById(‘btn-start’).onclick = startCamera;

document.getElementById(‘btn-scan’).onclick = () => { lastScan = 0; doScan(); };

document.getElementById(‘btn-clear’).onclick = () => {
entities = [];
entLayer.innerHTML = ‘’;
ecountEl.textContent = ‘0 entities’;
setStatus(‘cleared’);
};

document.getElementById(‘btn-voice’).onclick = function() {
voiceOn = !voiceOn;
this.textContent = voiceOn ? ‘voice on’ : ‘voice off’;
this.classList.toggle(‘active’, voiceOn);
if (!voiceOn && window.speechSynthesis) window.speechSynthesis.cancel();
};

document.getElementById(‘btn-cinema’).onclick = function() {
cinemaOn = !cinemaOn;
appEl.classList.toggle(‘cinema’, cinemaOn);
this.classList.toggle(‘active’, cinemaOn);
};
